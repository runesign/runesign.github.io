<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂电校园论坛</title>
</head>
<link rel="stylesheet" href="css/style_0.css">
<body>
    <!-- 整体布局 -->
    <div class="container right-panel-active">

        <!-- 注册框 -->
        <div class="container_from container_signup">
            <form action="#" class="from" id="from1">
                <h2 class="form_title">注册账号</h2>
                <input type="tel" placeholder="学号" class="input" pattern="^1[0-9]{12}*$">
                <input type="text" placeholder="用户名" class="input">
                <input type="password" placeholder="密码" class="input">
                <button class="btn">点击注册</button>
            </form>
        </div>

        <!-- 登录框 -->
        <div class="container_from container_signin">
            <form action="#" class="from" id="from2">
                <h2 class="form_title">欢迎登录</h2>
                <input type="text" placeholder="用户名" class="input">
                <input type="password" placeholder="密码" class="input">
                <div>
                    <span>记住密码</span><input type="checkbox" name="rup" id="rup" />
                    <span>自动登录</span><input type="checkbox" name="autoLogin" />
                </div>
                <a href="#" class="link">忘记密码?</a>
                <input type="button" value="登录"  class="btn" onclick="window.location.href='index_1.html'">
            </form>
        </div>

        <!--控制注册与登录移动-->
        <div class="container_overlay">
            <div class="overlay">
                <div class="overlay_panel overlay_left">
                    <button class="btn" id="signin">已有账号，直接登录</button>
                </div>
                <div class="overlay_panel overlay_right">
                    <button class="btn" id="signup">没有账号，点击注册</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
